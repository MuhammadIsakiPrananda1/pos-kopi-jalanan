name: kopi_jalanan_gank
description: Premium Digital Cashier (POS) for KOPI JALANAN GANK - Fast, Sleek, and Offline-First.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2
  permission_handler: ^11.3.1
  audioplayers: ^6.1.0
  flutter_slidable: ^3.1.1
  print_bluetooth_thermal: ^1.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/images/
